<h1>Список товаров</h1>
<a href="{% url 'product_create' %}">Добавить новый товар</a>
<ul>
    {% for p in products %}
        <li>
            <a href="{% url 'product_detail' p.pk %}">{{ p.name }}</a> — {{ p.price }} руб.
            [<a href="{% url 'product_update' p.pk %}">ред.</a>]
            [<a href="{% url 'product_delete' p.pk %}">удалить</a>]
        </li>
    {% endfor %}
</ul>
